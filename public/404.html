<!doctype html>
<html lang="es-MX" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>404 — Página no encontrada | Numen Aviation</title>
    <meta name="description" content="La ruta que buscas no existe." />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=DM+Sans:wght@300;400&display=swap"
    />
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; padding: 0; height: 100%; background: #080907; color: #f5f3ee; }
      body { font-family: 'DM Sans', system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; padding: 1.5rem; text-align: center; }
      .wrap { max-width: 28rem; }
      .eyebrow { letter-spacing: 0.2em; text-transform: uppercase; font-size: 0.75rem; color: #8a8b86; margin: 0 0 1rem; }
      h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(2.5rem, 6vw, 4rem); margin: 0 0 1rem; line-height: 1.05; }
      h1 em { font-style: italic; color: #9bb8a3; }
      .rule { width: 3rem; height: 1px; background: #c9a84c; margin: 1.25rem auto; }
      p { color: #b9b9b3; font-size: 0.9rem; margin: 0 0 2rem; }
      a.btn { display: inline-block; padding: 0.85rem 1.6rem; background: #c9a84c; color: #080907; text-decoration: none; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; font-size: 0.8rem; }
      a.btn:hover { background: #d4b96a; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <p class="eyebrow">Error 404</p>
      <h1>Página <em>no encontrada</em></h1>
      <div class="rule"></div>
      <p>La ruta que buscas no existe o fue movida.</p>
      <a class="btn" href="/">Volver al inicio</a>
    </main>
  </body>
</html>
