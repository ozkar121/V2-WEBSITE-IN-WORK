# Reconstruye el sitio cada día para refrescar los snapshots de flota y
# empty legs (scripts/prefetch-aircraft.mjs) en el HTML estático.
#
# Requiere el secret CF_DEPLOY_HOOK_URL:
#   1. Cloudflare dashboard → Workers & Pages → v2numenaviation →
#      Settings → Builds → Deploy Hooks → Create deploy hook (branch: main)
#   2. GitHub → repo → Settings → Secrets and variables → Actions →
#      New repository secret → nombre: CF_DEPLOY_HOOK_URL, valor: la URL del hook
name: Daily rebuild

on:
  schedule:
    # 12:00 UTC = 06:00 AM Ciudad de México
    - cron: "0 12 * * *"
  workflow_dispatch: {}

jobs:
  trigger-cloudflare-build:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare deploy hook
        run: |
          if [ -z "${{ secrets.CF_DEPLOY_HOOK_URL }}" ]; then
            echo "Falta el secret CF_DEPLOY_HOOK_URL"; exit 1
          fi
          curl -sf -X POST "${{ secrets.CF_DEPLOY_HOOK_URL }}"
          echo "Build disparado"
