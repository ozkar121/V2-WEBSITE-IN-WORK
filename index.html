    <!-- DataFast Analytics -->

      src="https://datafa.st/js/script.js"
    ></script>

    <!-- Google tag (gtag.js) — deferred until first interaction or idle to avoid blocking LCP -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }
      gtag('js', new Date());
      gtag('config', 'G-DJJ33CWBNV');
      gtag('config', 'AW-18123739578');
      (function () {
        var loaded = false;
        function loadGtag() {
          if (loaded) return; loaded = true;
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-DJJ33CWBNV';
          document.head.appendChild(s);
        }
        var evts = ['scroll', 'pointerdown', 'keydown', 'touchstart'];
        function once() { evts.forEach(function (e) { window.removeEventListener(e, once); }); loadGtag(); }
        evts.forEach(function (e) { window.addEventListener(e, once, { passive: true, once: true }); });
        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadGtag, { timeout: 4000 });
        } else {
          setTimeout(loadGtag, 3500);
        }
      })();
    </script>

    <!-- Conversion tracking (WhatsApp, phone, form) -->
    <script>
      (function () {
        document.addEventListener('click', function (e) {
          var link = e.target && e.target.closest ? e.target.closest('a[href]') : null;
          if (!link) return;
          var href = link.getAttribute('href') || '';
          if (href.indexOf('wa.me') !== -1) {
            try {
              gtag('event', 'whatsapp_click', {
                event_category: 'conversion',
                event_label: link.href,
                value: 1,
              });
            } catch (err) {}
          } else if (href.indexOf('tel:') === 0) {
            try {
              gtag('event', 'phone_call_click', {
                event_category: 'conversion',
                event_label: link.href,
                value: 1,
              });
            } catch (err) {}
          }
        }, true);
      })();
    </script>

    <!-- Performance hints -->
